  ai_constructions:
    # --- High severity (banned outright) ---
    - pattern: "यह न केवल .*? बल्कि"
      severity: high
    - pattern: "न केवल .*? बल्कि .*? भी"
      severity: high
    - pattern: "आज के युग में"
      severity: high
    - pattern: "आज के इस युग में"
      severity: high
    - pattern: "वर्तमान समय में"
      severity: high
    - pattern: "डिजिटल युग में"
      severity: high
    - pattern: "एक ऐसी दुनिया में जहाँ"
      severity: high
    - pattern: "कल्पना कीजिए एक ऐसी दुनिया की"
      severity: high
    - pattern: "गहराई से जानें"
      severity: high
    - pattern: "गहराई में उतरें"
      severity: high
    - pattern: "आइए जानें"
      severity: high
    - pattern: "आइए समझते हैं"
      severity: high
    - pattern: "यह ध्यान देने योग्य है"
      severity: high
    - pattern: "गौरतलब है कि"
      severity: high
    - pattern: "निःसंदेह"
      severity: high
    - pattern: "इसमें कोई संदेह नहीं"
      severity: high
    - pattern: "क्षमता को अनलॉक करें"
      severity: high
    # --- Medium severity (rare-only) ---
    - pattern: "चाहे आप .*? हों या"
      severity: medium
    - pattern: "क्या आपने कभी सोचा है"
      severity: medium
    - pattern: "आइए इसे विस्तार से समझते हैं"
      severity: medium
    - pattern: "आइए एक नज़र डालते हैं"
      severity: medium
    - pattern: "तो चलिए शुरू करते हैं"
      severity: medium
    - pattern: "इस लेख में हम"
      severity: medium
    - pattern: "इस ब्लॉग में हम"
      severity: medium
    - pattern: "तो देर किस बात की"
      severity: medium
    - pattern: "महत्वपूर्ण भूमिका निभात"
      severity: medium
    # --- Low severity (flag only at high frequency) ---
    - pattern: "अंत में,"
      severity: low
    - pattern: "निष्कर्ष में,"
      severity: low
    - pattern: "संक्षेप में,"
      severity: low
    - pattern: "कुल मिलाकर,"
      severity: low
    - pattern: "अंततः,"
      severity: low
  thresholds:
    # HI: the wide em-dash "—" is FOREIGN to Devanagari (Hindi has no native
    # em-dash; asides use the danda, comma, or parentheses). Any "—" reads as
    # machine/translation output. Stricter than the master 1.0: flag above 0.5
    # per 1000 words. Target 0.
    em_dash_per_1000_words: 0.5
    burstiness_min: 8.0
    # Relaxed from 8.0 to 7.5 (2026-06-25): real native Wikipedia prose measured
    # stdev ~7.85 — a borderline false positive. The deliberate-AI fixture sits at
    # 9.5+ so the burstiness flag never fires on it; relaxing does not weaken it.
    sentence_stdev_min: 7.5
    # HI: with the Devanagari-aware WORD_RX tokenizer (whole Devanagari runs,
    # not `\w`-shattered subwords), clean native Hindi TTR measures ~0.53–0.78,
    # comparable to Latin prose, so the master 0.45 threshold holds. (The earlier
    # ~0.20 readings were an artifact of `\w` splitting words on matras; that bug
    # is fixed.) Verified: editorial 0.60, marketing 0.59, borderline 0.78, and
    # the dense-repetitive AI fixture 0.53 all stay above 0.45 — TTR does not
    # false-fire on clean prose and is not the lever the AI fixture relies on.
    lexical_diversity_min: 0.45
    comma_density_max: 2.0
    bullet_parallelism_max: 0.80
    # NEW HI typography detector: max number of Devanagari-containing sentences
    # allowed to terminate with a Latin "." (instead of the danda "।") before
    # flagging. 0 = strict (any Latin-period-on-a-Devanagari-sentence flags).
    # Clean native danda-using prose scores 0 misses, so it never fires.
    latin_period_in_devanagari_max: 0

content_type_weights:
  marketing:     {statistical: 1.0, stylistic: 1.0, structural: 1.0}
  short-comms:   {statistical: 0.6, stylistic: 1.2, structural: 0.5}
  technical:     {statistical: 0.5, stylistic: 0.7, structural: 0.3}
  editorial-seo: {statistical: 0.9, stylistic: 1.0, structural: 1.0}

verdict_bands:
  LOW_RISK: [0, 24]
  MEDIUM_RISK: [25, 49]
  HIGH_RISK: [50, 74]
  CRITICAL: [75, 100]
