# HI notes:
# - Devanagari + \w: Python's default Unicode `re` matches Devanagari letters as
#   \w, so the analyzer wraps each suspect-vocabulary phrase with re.escape +
#   \b...\b and the boundaries behave correctly. Hindi postpositions (का/के/की,
#   में, से, को, ने …) are written as SEPARATE tokens, so \b boundaries do not
#   swallow them — the bare phrase matches cleanly.
# - Suspect vocabulary covers Tier 1 + Tier 2 (~140 entries). Tier 3 is documented
#   in references/tells-stylistic-hi.md but excluded here: false-positive risk on
#   common Hindi words is too high for a per-word matcher.
# - The "—" em-dash threshold is STRICTER than the master FR/EN (1.0): the wide
#   em-dash "—" is foreign to the Devanagari script (Hindi has no native em-dash;
#   asides use the danda, comma, or parentheses), so any "—" in Hindi prose reads
#   as machine/translation output. Target 0; flag above 0.5 per 1000 words.
# - latin_period_in_devanagari_max is the NEW HI typography threshold: the maximum
#   number of Devanagari-containing sentences allowed to terminate with a Latin "."
#   (instead of the danda "।") before the detector flags. Calibrated so clean
#   native danda-using prose scores 0 misses and never fires. Register-sensitive:
#   some modern web/Hinglish Hindi uses "." legitimately, hence the LOW weight.
# - burstiness_min and comma_density_max are copied verbatim from the master
#   thresholds block; they are currently UNREAD by analyze.py (vestigial). Keep
#   them; do not treat their presence as a bug.
